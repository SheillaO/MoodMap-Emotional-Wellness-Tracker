<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodMap - Track Your Emotional Wellness</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-inner">
            <img src="./images/pumpkin.png" class="pumpkin-img">
            <div>
                <h1>MoodMap</h1>
                <h2>Track Your Emotional Wellness</h2>
            </div>
        </div>
    </header>

    <!-- Stats Dashboard -->
    <section class="stats-section">
        <div id="stats-container"></div>
    </section>
    
    <main>
        <h3>How are you feeling right now?</h3>
        <div class="controls-container">
            <div class="source-radios">
                <p>Source:</p>
                <label><input type="radio" name="source" value="cat" checked> 🐱 Cats Only</label>
                <label><input type="radio" name="source" value="snl"> 📺 SNL Only</label>
                <label><input type="radio" name="source" value="both"> 🎭 Both</label>
            </div>
